server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /root/sf;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://www.googletagmanager.com https://www.clarity.ms https://scripts.clarity.ms https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.tile.openstreetmap.org https://www.google-analytics.com https://www.googletagmanager.com; connect-src 'self' https://*.tile.openstreetmap.org https://www.google-analytics.com https://www.googletagmanager.com https://www.clarity.ms; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~ /\.(?!well-known) { deny all; return 404; }
    location ~ \.(env|git|htaccess|htpasswd|ini|log|sh|sql|bak|swp)$ { deny all; return 404; }
    location ^~ /security/ { deny all; return 404; }

    autoindex off;

 location /albania { try_files $uri $uri/ /countries/albania/index.html; }
 location /bosnia-herzegovina { try_files $uri $uri/ /countries/bosnia-herzegovina/index.html; }
 location /bulgaria { try_files $uri $uri/ /countries/bulgaria/index.html; }
 location /croatia { try_files $uri $uri/ /countries/croatia/index.html; }
 location /kosovo { try_files $uri $uri/ /countries/kosovo/index.html; }
 location /montenegro { try_files $uri $uri/ /countries/montenegro/index.html; }
 location /north-macedonia { try_files $uri $uri/ /countries/north-macedonia/index.html; }
 location /romania { try_files $uri $uri/ /countries/romania/index.html; }
 location /serbia { try_files $uri $uri/ /countries/serbia/index.html; }
 location /slovenia { try_files $uri $uri/ /countries/slovenia/index.html; }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /500.html;
}
