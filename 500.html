<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Error | Balkan Tourism</title>
  <link rel="stylesheet" href="/css/global.css">
  <style>
    .error-page { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:2rem; }
    .error-code { font-size:8rem; font-family:'Playfair Display SC',serif; background:linear-gradient(135deg,var(--secondary),var(--primary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1; }
    .error-msg { font-size:1.5rem; color:rgba(255,255,255,0.7); margin:1.5rem 0; }
    .error-home { display:inline-block; padding:14px 32px; border-radius:30px; background:linear-gradient(135deg,var(--primary),var(--accent)); color:#fff; text-decoration:none; font-weight:700; transition:transform 0.3s; }
    .error-home:hover { transform:scale(1.05); }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">500</div>
    <p class="error-msg">Something went wrong on our end 🔧</p>
    <a href="/" class="error-home">← Back Home</a>
  </div>
</body>
</html>
