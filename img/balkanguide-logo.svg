<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bgLogo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </linearGradient>
    <linearGradient id="gAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background circle (transparent, just the gradient border) -->
  <rect width="500" height="500" rx="100" fill="url(#bgLogo)" stroke="url(#gAccent)" stroke-width="8"/>

  <!-- Mountain symbol -->
  <path d="M100 350 L180 180 L220 240 L260 160 L300 220 L340 140 L380 240 L420 350 Z"
        fill="none" stroke="url(#gAccent)" stroke-width="6" stroke-linejoin="round"/>

  <!-- Wave (sea) -->
  <path d="M80 370 Q150 340 220 370 Q290 400 360 370 Q430 340 500 370"
        fill="none" stroke="#00d4aa" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- Sun circle -->
  <circle cx="340" cy="180" r="15" fill="none" stroke="#a855f7" stroke-width="3" opacity="0.7"/>

  <!-- Text: BALKAN -->
  <text x="250" y="430" font-family="Georgia, serif" font-size="48" fill="#00d4aa"
        text-anchor="middle" font-weight="bold" letter-spacing="8">BALKAN</text>

  <!-- Text: GUIDE -->
  <text x="250" y="470" font-family="Georgia, serif" font-size="36" fill="rgba(255,255,255,0.7)"
        text-anchor="middle" letter-spacing="12">GUIDE</text>
</svg>
